---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - lodestar.io
  resources:
  - dorapolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - lodestar.io
  resources:
  - dorapolicies/finalizers
  verbs:
  - update
- apiGroups:
  - lodestar.io
  resources:
  - dorapolicies/status
  verbs:
  - get
  - patch
  - update
